<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator | MediTrack Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --bg-overlay: rgba(15, 23, 42, 0.8); 
            --card-bg: rgba(255, 255, 255, 0.95); 
            --primary: #a855f7; 
            --text-main: #1e293b; 
            --text-dim: #64748b; 
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            /* Colorful Medical Background sethachu */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            padding: 15px; 
            font-size: 13px; 
            min-height: 100vh;
        }
        
        .container { width: 100%; max-width: 450px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h1 { font-size: 22px; color: #ffffff; margin: 0; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .back-link { text-decoration: none; color: #ffffff; font-size: 13px; font-weight: bold; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 8px; }

        /* Bright Glass Calculator Card */
        .calculator-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 25px; 
            border: 2px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); 
            text-align: center; 
        }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 12px; margin-bottom: 6px; color: var(--text-dim); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            background: #f1f5f9; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            color: #1e293b; 
            box-sizing: border-box; 
            font-size: 15px; 
            outline: none; 
            transition: 0.3s; 
        }
        input:focus { border-color: var(--primary); background: #ffffff; box-shadow: 0 0 15px rgba(168, 85, 247, 0.1); }

        .btn-calc { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(to right, var(--primary), #9333ea); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 10px; 
            transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3);
        }
        .btn-calc:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4); }

        /* Result Section */
        .result-section { margin-top: 30px; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bmi-value { font-size: 48px; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .bmi-status { font-size: 18px; font-weight: bold; padding: 6px 20px; border-radius: 30px; display: inline-block; }
        
        .status-under { background: #fef3c7; color: #92400e; }
        .status-normal { background: #dcfce7; color: #166534; }
        .status-over { background: #ffedd5; color: #9a3412; }
        .status-obese { background: #fee2e2; color: #991b1b; }

        .info-text { margin-top: 15px; color: var(--text-dim); font-size: 13px; line-height: 1.5; font-weight: 500; }

        /* Scale Reference Box */
        .reference-box {
            margin-top: 25px; 
            background: rgba(255, 255, 255, 0.9); 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .reference-box h4 { margin: 0 0 10px 0; font-size: 13px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        .reference-box ul { margin: 0; padding-left: 15px; font-size: 12px; color: #475569; line-height: 1.8; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-weight"></i> BMI Calc</h1>
        <a href="/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div class="calculator-card">
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g. 70" step="0.1">
        </div>
        
        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="e.g. 175">
        </div>

        <button class="btn-calc" onclick="calculateBMI()">CALCULATE BMI</button>

        <div id="resultArea" class="result-section">
            <p style="color: var(--text-dim); margin: 0; font-weight: 600;">Your Body Mass Index is</p>
            <div id="bmiValue" class="bmi-value">22.5</div>
            <div id="bmiStatus" class="bmi-status status-normal">Normal Weight</div>
            
            <div class="info-text" id="bmiDesc">
                You have a healthy body weight. Keep it up!
            </div>
        </div>
    </div>

    <div class="reference-box">
        <h4>BMI Scale Reference:</h4>
        <ul>
            <li>Underweight: < 18.5</li>
            <li>Normal weight: 18.5 – 24.9</li>
            <li>Overweight: 25 – 29.9</li>
            <li>Obese: > 30</li>
        </ul>
    </div>
</div>

<script>
    function calculateBMI() {
        const weight = parseFloat(document.getElementById('weight').value);
        const heightCm = parseFloat(document.getElementById('height').value);
        
        if (weight > 0 && heightCm > 0) {
            const heightM = heightCm / 100;
            const bmi = (weight / (heightM * heightM)).toFixed(1);
            
            document.getElementById('bmiValue').innerText = bmi;
            document.getElementById('resultArea').style.display = 'block';
            
            const statusBox = document.getElementById('bmiStatus');
            const descBox = document.getElementById('bmiDesc');
            
            statusBox.className = 'bmi-status';
            
            if (bmi < 18.5) {
                statusBox.innerText = "Underweight";
                statusBox.classList.add('status-under');
                descBox.innerText = "You are in the underweight range. Consider consulting a nutritionist.";
            } else if (bmi >= 18.5 && bmi <= 24.9) {
                statusBox.innerText = "Normal Weight";
                statusBox.classList.add('status-normal');
                descBox.innerText = "Great! You have a healthy body weight. Maintain your diet and exercise.";
            } else if (bmi >= 25 && bmi <= 29.9) {
                statusBox.innerText = "Overweight";
                statusBox.classList.add('status-over');
                descBox.innerText = "You are slightly overweight. Regular exercise and a balanced diet can help.";
            } else {
                statusBox.innerText = "Obese";
                statusBox.classList.add('status-obese');
                descBox.innerText = "You are in the obese range. It's recommended to consult a doctor for a health plan.";
            }
        } else {
            alert("Please enter valid Weight and Height!");
        }
    }
</script>

</body>
</html>
