<!DOCTYPE html>
<html>
<head>
    <title>Security | MediTrack</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.7), rgba(96, 165, 250, 0.6)), 
                        url('https://images.unsplash.com/photo-1576091160550-2173dad99901?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .box { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 25px; width: 90%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 2px solid white; text-align: center;
        }
        h2 { color: #1e3a8a; margin-top: 0; }
        label { display: block; font-size: 12px; color: #64748b; margin-top: 15px; font-weight: bold; text-align: left; }
        input { 
            width: 100%; padding: 12px; margin-top: 5px; background: #f0f7ff; 
            border: 1px solid #dbeafe; border-radius: 10px; box-sizing: border-box; outline: none;
        }
        .btn { 
            width: 100%; padding: 14px; background: #2563eb; border: none; 
            border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 25px; 
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }
        .back { text-decoration: none; color: #1e3a8a; font-size: 13px; display: block; margin-bottom: 20px; text-align: left; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <a href="/settings" class="back"><i class="fas fa-arrow-left"></i> settings.html</a>
        <h2><i class="fas fa-user-shield"></i> Security</h2>
        
        <label>Account Email</label>
        <input type="text" value="{{ user['email'] }}" disabled>

        <form action="/change_password" method="POST">
            <label>Update New Password</label>
            <input type="password" name="new_password" placeholder="••••••••" required>
            <button type="submit" class="btn">UPDATE PASSWORD</button>
        </form>
    </div>
</body>
</html>
