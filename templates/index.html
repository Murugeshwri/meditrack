<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack Pro | Welcome</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f0f7ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        /* Heartbeat Animation */
        .logo-icon {
            font-size: 70px;
            color: var(--primary);
            margin-bottom: 20px;
            animation: heartbeat 1.2s infinite;
        }

        .app-name {
            font-size: 28px;
            font-weight: 800;
            color: #1e3a8a;
            letter-spacing: 1px;
            margin: 0;
        }

        .loading-bar {
            width: 150px;
            height: 4px;
            background: #dbeafe;
            margin: 25px auto;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary);
            animation: loading 2s infinite linear;
        }

        .status-text {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <div class="logo-icon">
            <i class="fas fa-heartbeat"></i>
        </div>
        <h1 class="app-name">MediTrack Pro</h1>
        <div class="loading-bar"></div>
        <p class="status-text">Initializing Secure Health Lab...</p>
    </div>

    <script>
        // 3 seconds loading mudinthu Login page-ku auto-maatic-aa pogaum
        setTimeout(function() {
            window.location.href = "/login";
        }, 3500); // 3.5 Seconds delay
    </script>
</body>
</html>
