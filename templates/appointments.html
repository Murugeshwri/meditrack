<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments | MediTrack Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #2563eb; 
            --light-blue: #dbeafe;
            --white: #ffffff;
            --text-dark: #1e3a8a;
            --text-gray: #64748b;
            --green: #10b981;
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            /* Colorful & Bright Medical Background */
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.7), rgba(96, 165, 250, 0.6)), 
                        url('https://images.unsplash.com/photo-1584981485782-2fe99bdad61f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-dark); 
            display: flex; 
            justify-content: center; 
            padding: 15px; 
            min-height: 100vh;
        }
        
        .container { width: 100%; max-width: 500px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 22px; color: var(--white); margin: 0; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .real-time { font-size: 12px; color: #fef08a; font-weight: bold; }

        /* Bright Glass Booking Card */
        .booking-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            border: 2px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: var(--text-dark); font-weight: 700; }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            background: #f0f7ff; 
            border: 2px solid #dbeafe; 
            border-radius: 12px; 
            color: var(--text-dark); 
            box-sizing: border-box; 
            font-size: 14px; 
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: var(--white); }
        
        .btn-book { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(to right, var(--primary), #3b82f6);
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            font-size: 15px; 
            transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }
        .btn-book:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4); }

        /* Upcoming List Title */
        .apt-list-header { font-size: 13px; font-weight: 800; color: var(--white); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        .apt-card { 
            background: var(--white); 
            padding: 15px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            border-left: 5px solid var(--primary); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s; 
        }
        
        .apt-info h3 { margin: 0; font-size: 15px; color: var(--text-dark); font-weight: 700; }
        .apt-info p { margin: 4px 0 0; font-size: 12px; color: var(--text-gray); }
        
        .status-badge { font-size: 10px; padding: 4px 10px; border-radius: 30px; font-weight: 800; text-transform: uppercase; background: #dcfce7; color: var(--green); }

        .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 18px; margin-left: 10px; }
        
        .back-link { text-decoration: none; color: var(--white); font-size: 13px; font-weight: bold; padding: 5px 10px; background: rgba(255,255,255,0.2); border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1><i class="fas fa-stethoscope"></i> Book Apt</h1>
            <div id="clock" class="real-time">Loading time...</div>
        </div>
        <a href="/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div class="booking-card">
        <div class="input-group">
            <label>Doctor Name</label>
            <input type="text" id="docName" placeholder="Dr. Ramesh">
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
                <label>Date</label>
                <input type="date" id="aptDate">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Time</label>
                <input type="time" id="aptTime">
            </div>
        </div>
        <div class="input-group">
            <label>Visit Reason</label>
            <select id="aptReason">
                <option value="Check-up">Regular Check-up</option>
                <option value="Consultation">Specialist Consultation</option>
                <option value="Vaccination">Vaccination</option>
            </select>
        </div>
        <button class="btn-book" onclick="bookAppointment()">CONFIRM BOOKING</button>
    </div>

    <div class="apt-list-header">Upcoming Visits</div>
    <div id="aptList"></div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true };
        document.getElementById('clock').innerText = now.toLocaleString('en-US', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    let appointments = JSON.parse(localStorage.getItem('mediApts')) || [];

    function displayAppointments() {
        const list = document.getElementById('aptList');
        list.innerHTML = '';
        if (appointments.length === 0) {
            list.innerHTML = `<p style="text-align:center; color:white; opacity:0.8; margin-top:20px;">No appointments yet.</p>`;
            return;
        }
        appointments.forEach((apt, index) => {
            list.innerHTML += `
                <div class="apt-card">
                    <div class="apt-info">
                        <h3>${apt.doctor}</h3>
                        <p><i class="far fa-calendar-alt"></i> ${apt.date} at ${apt.time}</p>
                        <p style="color:var(--primary); font-weight:600;">${apt.reason}</p>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span class="status-badge">Confirmed</span>
                        <button class="delete-btn" onclick="deleteApt(${index})"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>`;
        });
        localStorage.setItem('mediApts', JSON.stringify(appointments));
    }

    function bookAppointment() {
        const doctor = document.getElementById('docName').value;
        const date = document.getElementById('aptDate').value;
        const time = document.getElementById('aptTime').value;
        const reason = document.getElementById('aptReason').value;
        if (doctor && date && time) {
            appointments.push({ doctor, date, time, reason });
            document.getElementById('docName').value = '';
            displayAppointments();
            alert("Booked Successfully!");
        } else {
            alert("Please fill all details.");
        }
    }

    function deleteApt(index) {
        if(confirm("Cancel appointment?")) {
            appointments.splice(index, 1);
            displayAppointments();
        }
    }
    displayAppointments();
</script>

</body>
</html>
